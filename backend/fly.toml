# fly.toml app configuration file generated for aussiepath-backend-api on 2026-07-14T02:00:54+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aussiepath-backend-api'
primary_region = 'sin'

[build]
[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "aussiepath_data"
  destination = "/data"